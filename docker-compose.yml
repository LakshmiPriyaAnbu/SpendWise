services:
  db:
    image: postgres:17-alpine
    container_name: spendwise-db
    environment:
      POSTGRES_USER: spendwise
      POSTGRES_PASSWORD: spendwise
      POSTGRES_DB: spendwise
    ports:
      - "5433:5432"
    volumes:
      - spendwise-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise -d spendwise"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  spendwise-pgdata:
