# Render blueprint: one web service (Express API + built Angular app) + Postgres.
# Connect the repo at https://dashboard.render.com/blueprints — Render reads this file.

databases:
  - name: spendwise-db
    databaseName: spendwise
    user: spendwise
    plan: free # free DBs are time-limited on Render; upgrade to basic-256mb for real use

services:
  - type: web
    name: spendwise
    runtime: node
    plan: free # spins down when idle (~1 min cold start); starter keeps it always-on
    buildCommand: npm install && npm run build
    startCommand: cd server && npx prisma migrate deploy && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spendwise-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
